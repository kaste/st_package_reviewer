name: Package Reviewer PR action
description: Review a repository or channel PR
inputs:
  phase:
    description: Action mode ('review' to generate the review, 'report' to post a PR comment)
    default: review
    required: false
  pr:
    description: Pull Request URL (required for 'review', e.g. https://github.com/owner/repo/pull/123)
    required: false
  file:
    description: Path to channel JSON within the repo
    default: repository.json
    required: false
  thecrawl:
    description: "Optional path to a local thecrawl repo, or a URL to clone (supports @ref to pin)"
    default: https://github.com/packagecontrol/thecrawl
    required: false
  run_id:
    description: Workflow run ID to download artifacts from (required for 'report', e.g. github.event.workflow_run.id)
    required: false
runs:
  using: composite
  steps:
    - name: Ensure uv is available
      uses: astral-sh/setup-uv@v3

    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail
        phase="${{ inputs.phase }}"

        if [[ "$phase" == "review" ]]; then
          if [[ -z "${{ inputs.pr }}" ]]; then
            echo "::error ::Missing required input 'pr' for phase=review" >&2
            exit 2
          fi
        elif [[ "$phase" == "report" ]]; then
          if [[ -z "${{ inputs.run_id }}" ]]; then
            echo "::error ::Missing required input 'run_id' for phase=report" >&2
            exit 2
          fi
        else
          echo "::error ::Unknown phase: $phase (expected 'review' or 'report')" >&2
          exit 2
        fi

    - name: Run Package Reviewer
      if: inputs.phase == 'review'
      shell: bash
      run: |
        set -euo pipefail
        "${{ github.action_path }}/action.sh" --pr "${{ inputs.pr }}" --file "${{ inputs.file }}" --thecrawl "${{ inputs.thecrawl }}"

    - name: Write PR metadata
      if: inputs.phase == 'review'
      shell: bash
      run: |
        set -euo pipefail
        pr="${{ inputs.pr }}"
        if [[ ! "$pr" =~ /pull/([0-9]+)(/|$) ]]; then
          echo "::error ::Could not parse PR number from 'pr' URL: $pr" >&2
          exit 2
        fi
        pr_number="${BASH_REMATCH[1]}"
        printf '%s\n' "$pr_number" > review_pr_number.txt

    - name: Upload review artifact
      if: inputs.phase == 'review'
      uses: actions/upload-artifact@v4
      with:
        name: review-md
        path: |
          review.md
          review_pr_number.txt
        retention-days: 1
        if-no-files-found: error

    - name: Download review artifact
      if: inputs.phase == 'report'
      uses: actions/download-artifact@v4
      with:
        name: review-md
        path: _handoff
        run-id: ${{ inputs.run_id }}

    - name: Post PR comment
      if: inputs.phase == 'report'
      uses: actions/github-script@v7
      env:
        REVIEW_MD_PATH: _handoff/review.md
        REVIEW_PR_NUMBER_PATH: _handoff/review_pr_number.txt
      with:
        script: |
          const fs = require('fs');

          const reviewPath = process.env.REVIEW_MD_PATH;
          const body = fs.readFileSync(reviewPath, 'utf8');

          const prNumberPath = process.env.REVIEW_PR_NUMBER_PATH;
          const prNumberRaw = fs.readFileSync(prNumberPath, 'utf8').trim();
          const prNumber = Number.parseInt(prNumberRaw, 10);
          if (!Number.isInteger(prNumber) || prNumber <= 0) {
            throw new Error("Missing/invalid PR number in review_pr_number.txt");
          }

          const marker = `<!-- st_package_reviewer run_id=${{ inputs.run_id }} -->`;
          const commentBody = `${marker}\n\n${body}`;

          const { owner, repo } = context.repo;
          const issue_number = prNumber;

          await github.rest.issues.createComment({
            owner,
            repo,
            issue_number,
            body: commentBody,
          });
